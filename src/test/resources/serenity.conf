serenity {
  # Tên project hiển thị trong report
  project.name = "Serenity Demo Project"


  # Chụp screenshot khi nào
  # FOR_FAILURES | FOR_EACH_ACTION | AFTER_EACH_STEP | DISABLED
  take.screenshots=AFTER_EACH_STEP

  # Thời gian chờ tối đa (mili-giây)
  webdriver.timeouts.implicitlywait = 5

  # Explicit wait mặc định cho waitUntilVisible(), waitUntilClickable(), v.v. (giây)
  webdriver.wait.for.timeout = 6

}

webdriver {
  driver = chrome
  autodownload = true

  chrome {
    switches = "--start-maximized;--disable-notifications"
  }
}

environments {
  default {
    webdriver.base.url = "http://103.245.237.118:8081/opencart/administrator/"
  }

  dev {
    webdriver.base.url = "http://107.172.50.178/opencart/administrator/"
  }

  production {
    webdriver.base.url = "https://demo.opencart.com/TlbeVW/"
  }
}