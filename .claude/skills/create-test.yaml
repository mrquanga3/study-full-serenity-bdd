name: create-test
description: Create new test features, step definitions, page objects, and screenplay tasks
trigger:
  keywords:
    - "create test"
    - "new feature"
    - "add step"
    - "new page object"
    - "add screenplay"
    - "create action"

instructions: |
  Khi tạo test mới cho Serenity BDD project:

  1. **Feature Files (.feature)**
     - Location: `src/test/resources/features/<domain>/<feature_name>.feature`
     - Format: Gherkin (Given-When-Then)
     - Luôn có tag: `@<domain>` hoặc `@smoke`, `@regression`
     - Không hardcode test data - dùng Examples: hoặc testdata folder

  2. **Step Definitions**
     - Location: `src/test/java/com/example/stepdefinitions/<Domain>Steps.java`
     - Extend `BaseSteps` nếu có, hoặc `BaseTest`
     - Inject Page Object hoặc Action
     - Không chứa Selenium logic trực tiếp
     - Sử dụng annotation: `@Given`, `@When`, `@Then`

  3. **Page Objects**
     - Location: `src/test/java/com/example/pages/<PageName>Page.java`
     - Extend `PageObject` từ Serenity
     - Dùng `@FindBy` với WebElementFacade
     - Không dùng `Thread.sleep()` - dùng `waitUntilVisible()` hoặc `withTimeoutOf()`
     - Methods tên rõ: `clickLoginButton()`, `fillEmailField()`

  4. **Screenplay Tasks/Actions**
     - Location: `src/test/java/com/example/actions/<ActionName>.java`
     - Implement `Task` từ Serenity Screenplay
     - Gọi Page Object methods, không Selenium trực tiếp
     - Tên action: động từ + object (VD: `LoginWithValidCredentials`)

  5. **Quy chuẩn Code**
     - Package: `com.example.*`
     - Naming: PascalCase class, camelCase method
     - Test data: CSV/JSON trong `src/test/resources/testdata/`
     - Luôn viết assert rõ ràng, message mô tả

  6. **Cập nhật**
     - Sau khi tạo, cập nhật SKILL.md với module/bài tập mới
     - Nếu tạo feature mới, cập nhật README.md phần ví dụ

tags:
  - test
  - feature
  - serenity
  - automation
