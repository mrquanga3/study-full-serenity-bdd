name: update-doc
description: Update documentation, README, CLAUDE.md, and tutorials
trigger:
  keywords:
    - "update doc"
    - "update readme"
    - "update tutorial"
    - "update guide"
    - "edit doc"

instructions: |
  Khi cập nhật tài liệu/README cho Serenity BDD project:

  1. **README.md (Giáo trình)**
     - Giữ cấu trúc slide format
     - Khi thêm module mới, đánh số thứ tự rõ ràng
     - Cập nhật link tới code ví dụ (nếu có)
     - Thêm "Bài tập" section ở cuối mỗi module

  2. **CLAUDE.md (Hướng dẫn dự án)**
     - Cập nhật Cấu trúc Project nếu thêm folder/file mới
     - Cập nhật lệnh thường dùng nếu thêm scenario mới
     - Cập nhật Convention nếu thay đổi naming pattern
     - Cập nhật Stack kỹ thuật nếu thêm dependency

  3. **SKILL.md (Bảng theo dõi)**
     - Ghi lại module/skill mới được triển khai
     - Ghi status: 'Completed', 'In Progress', 'Pending'

  4. **Quy chuẩn**
     - Dùng tiếng Việt cho nội dung giáo trình
     - Code example phải chạy được (test chắc chắn)
     - Link hình ảnh: dùng path tương đối
     - Update file nào, cập nhật CLAUDE.md/SKILL.md kèm theo

tags:
  - documentation
  - tutorial
  - giáo-trình
