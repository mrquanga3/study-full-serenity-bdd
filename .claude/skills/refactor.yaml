name: refactor
description: Refactor code, improve test structure, optimize Page Objects and Actions
trigger:
  keywords:
    - "refactor"
    - "improve code"
    - "optimize"
    - "extract"
    - "consolidate"
    - "clean up"
    - "simplify"

instructions: |
  Khi refactor code Serenity BDD project:

  1. **Scope Refactor**
     - Page Object: consolidate duplicate selectors, extract common actions
     - Step Definition: tách logic phức tạp thành Action riêng
     - Test Data: di chuyển hardcode thành file CSV/JSON
     - Base Class: tách common setup/teardown

  2. **Page Object Refactor**
     - Xác định duplicate selectors (@FindBy) - gộp lại
     - Extract method: nếu multiple steps dùng cùng flow - tạo method
     - Loại bỏ getter không dùng
     - Tên method rõ ràng: `clickLoginButton()` > `clickBtn()`
     - Không để logic Selenium trong step definition

  3. **Step Definition Refactor**
     - Step phải gọi Page Object / Action ONLY
     - Không chứa Assert trực tiếp - để action return value
     - Inject dependency (Page Object) qua constructor, không static
     - Group related steps vào 1 file (Domain-based)

  4. **Screenplay/Action Refactor**
     - Tách action phức tạp thành sub-actions
     - Dùng `Task.where()` builder pattern
     - Action phải có input/output rõ ràng
     - Tên rõ: `LoginWithValidCredentials` > `Login`

  5. **Test Data Refactor**
     - Hardcode data → CSV/JSON file
     - Duplicated test data → reuse từ file
     - Magic string → constant hoặc config
     - Naming: testdata/<domain>/<scenario>.csv

  6. **Safe Refactoring**
     - ✅ Run test trước refactor - confirm pass
     - ✅ Refactor từng phần nhỏ, run test sau mỗi phần
     - ✅ Dùng IDE rename tool nếu đổi tên (safe rename)
     - ✅ Không delete code cũ vội - chắc chắn test vẫn pass
     - ❌ Không mix logic change với refactor
     - ❌ Không refactor + fix bug cùng lúc (separate commit)

  7. **Checklist**
     - [ ] Code lặp lại → đã consolidate
     - [ ] Naming rõ ràng → đã review
     - [ ] Test still pass → đã chạy verify
     - [ ] No dead code → xóa unused method
     - [ ] No magic number → đã extract constant

tags:
  - refactoring
  - code-quality
  - improvement
  - serenity
