name: review-code
description: Review test code, check quality, security, and best practices
trigger:
  keywords:
    - "review code"
    - "code review"
    - "check quality"
    - "validate"
    - "audit code"

instructions: |
  Khi review test code Serenity BDD project:

  1. **Structure Review**
     - ✓ Package structure: com.example.* + subfolder align với convention
     - ✓ Class location: Pages/, StepDefinitions/, Actions/ folder
     - ✓ Naming: PascalCase class, camelCase method
     - ✓ Dependencies: inject via constructor, không static

  2. **Page Object Review**
     - ✓ Extend `PageObject` từ Serenity
     - ✓ @FindBy locators: valid CSS/XPath, specific enough
     - ✓ No `Thread.sleep()` - dùng `waitUntilVisible()`, `withTimeoutOf()`
     - ✓ Method tên rõ: `clickLoginButton()` không `click()`
     - ✓ Return type: `void` hoặc return value cho assert

  3. **Step Definition Review**
     - ✓ Annotation: @Given, @When, @Then đầu đủ
     - ✓ Parameter: regex pattern rõ ràng
     - ✓ Only gọi Page Object hoặc Action
     - ✓ No Selenium code directly
     - ✓ No hardcode - data từ Parameters hoặc Constants
     - ✓ No Thread.sleep()

  4. **Screenplay Action Review**
     - ✓ Implement `Task` từ Serenity
     - ✓ `performAs(Actor)` method rõ ràng
     - ✓ Call Page Object methods, not WebDriver
     - ✓ Builder pattern nếu có
     - ✓ Tên action động từ: `Login`, `SubmitForm`, không `DoThis`

  5. **Test Best Practice**
     - ✓ Feature file: @tag rõ ràng, scenario mô tả rõ ràng
     - ✓ Test data: Examples hoặc testdata/ folder
     - ✓ Assertion: rõ ràng message
     - ✓ Hook: @Before @After nếu có setup/teardown
     - ✓ No @Ignore/@Skip - nếu skip thì xóa hoặc fix

  6. **Code Quality**
     - ✓ No unused import, no dead code
     - ✓ No magic number/string - extract constant
     - ✓ Comment: only nếu WHY không rõ ràng
     - ✓ Method nhỏ, focus, < 20 line
     - ✓ No duplication - consolidate common logic

  7. **Security / Best Practice**
     - ✓ No password/credentials hardcode - dùng config
     - ✓ No sensitive data log
     - ✓ Database: dùng prepared statement (if applicable)
     - ✓ API: handle error response, timeout
     - ✓ File: không write sensitive data unencrypted

  8. **Review Checklist**
     - [ ] Code structure align convention
     - [ ] No hardcode, no magic value
     - [ ] All wait explicit, no Thread.sleep()
     - [ ] All test pass locally + CI
     - [ ] No security concern
     - [ ] Naming clear, easy to understand
     - [ ] No dead code, no duplication

  9. **Feedback Format**
     - Issue: describe rõ
     - Location: file:line
     - Suggestion: code snippet nếu có

tags:
  - code-review
  - quality
  - validation
  - serenity
